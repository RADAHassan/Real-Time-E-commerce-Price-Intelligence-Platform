price_intelligence:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:

    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BIGQUERY_DATASET', 'price_intelligence') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS', '') }}"
      location: "{{ env_var('BIGQUERY_LOCATION', 'US') }}"
      threads: 4
      timeout_seconds: 300
      priority: interactive

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: price_intelligence
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: US
      threads: 8
      timeout_seconds: 600
      priority: batch
