version: 2

models:
  - name: mart_current_prices
    description: >
      One row per product showing the most recently scraped price.
      This is the primary table for the "Live Prices" dashboard page.
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: price
        tests:
          - not_null
          - is_non_negative
      - name: scraped_at
        tests: [not_null]

  - name: mart_price_history
    description: >
      Full daily price history with day-over-day change metrics.
      One row per (product_id, scraped_date).
    columns:
      - name: product_id
        tests: [not_null]
      - name: price
        tests:
          - not_null
          - is_non_negative
      - name: scraped_date
        tests: [not_null]

  - name: mart_price_stats
    description: >
      Aggregate statistics (mean, median, stddev, percentiles) per source
      and currency.  Refreshed daily.
    columns:
      - name: source
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: product_count
        tests: [not_null]
      - name: avg_price
        tests:
          - not_null
          - is_non_negative

  - name: mart_price_alerts
    description: >
      Products with a price drop ≥ {{ var('alert_drop_pct') }} % in the
      last {{ var('alert_window_days') }} days.  May be empty when no
      significant drops have occurred.
    columns:
      - name: product_id
        tests: [not_null]
      - name: price_change_pct
        tests: [not_null]
