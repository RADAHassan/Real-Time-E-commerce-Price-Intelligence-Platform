version: 2

models:
  - name: stg_prices
    description: >
      Cleaned and typed price observations from all five scrapers.
      Rows with null product_id, source, or price are dropped.
      Prices below zero are excluded.  All timestamps are cast to UTC.
    columns:
      - name: product_id
        description: MD5 hash of the canonical product URL (natural key).
        tests:
          - not_null
      - name: source
        description: Hostname of the scraped site.
        tests:
          - not_null
          - accepted_values:
              values:
                - books.toscrape.com
                - scrapeme.live
                - jumia.ma
                - ultrapc.ma
                - micromagma.ma
      - name: url
        tests:
          - not_null
      - name: title
        tests:
          - not_null
      - name: price
        description: Scraped price (≥ 0).
        tests:
          - not_null
          - is_non_negative   # custom generic test (macros/test_is_non_negative.sql)
      - name: currency
        description: Upper-cased ISO-4217 code.
        tests:
          - not_null
          - accepted_values:
              values: [GBP, EUR, MAD, USD]
      - name: scraped_at
        description: UTC timestamp of the scrape event.
        tests:
          - not_null
      - name: scraped_date
        description: Calendar date derived from scraped_at (for partitioning / joins).
        tests:
          - not_null
