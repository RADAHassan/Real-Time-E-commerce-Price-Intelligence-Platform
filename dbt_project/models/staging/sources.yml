version: 2

sources:
  - name: raw
    description: >
      Raw price observations loaded into BigQuery by the Airflow
      `dbt_transformations` DAG before each dbt run.
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: price_intelligence_raw
    tables:
      - name: prices
        description: >
          One row per scrape event.  Loaded from the scrapers' JSONL output
          (data/<spider_name>/*.jsonl) via the BigQuery Python client.
        columns:
          - name: product_id
            description: MD5 hash of the canonical product URL.
            tests:
              - not_null
          - name: source
            description: Hostname of the scraped site (e.g. jumia.ma).
            tests:
              - not_null
              - accepted_values:
                  values:
                    - books.toscrape.com
                    - scrapeme.live
                    - jumia.ma
                    - ultrapc.ma
                    - micromagma.ma
          - name: url
            tests:
              - not_null
          - name: title
            tests:
              - not_null
          - name: price
            description: Scraped price as a float (never negative).
            tests:
              - not_null
          - name: currency
            description: ISO-4217 currency code (GBP, EUR, MAD).
            tests:
              - not_null
          - name: scraped_at
            description: UTC timestamp of the scrape event.
            tests:
              - not_null
