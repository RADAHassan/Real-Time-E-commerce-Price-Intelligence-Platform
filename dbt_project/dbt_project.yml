name: price_intelligence
version: "1.0.0"
config-version: 2

profile: price_intelligence

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Dataset that holds the raw scraped rows loaded by Airflow
  raw_dataset: price_intelligence_raw
  # Minimum absolute price (0 = free products allowed)
  min_price: 0
  # Alert threshold: price drop ≥ this % triggers mart_price_alerts
  alert_drop_pct: 5
  # Rolling window (days) used in alert mart
  alert_window_days: 7

models:
  price_intelligence:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
