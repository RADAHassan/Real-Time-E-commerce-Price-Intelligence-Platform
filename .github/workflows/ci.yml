name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: dbt compile (syntax check)
        run: |
          cd dbt_project
          dbt compile --profiles-dir . --target dev
        continue-on-error: true  # no DB connection in CI until Phase 5
