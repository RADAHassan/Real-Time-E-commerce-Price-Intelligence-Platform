name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Python: lint + test ──────────────────────────────────────────────────
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        env:
          USE_MOCK_DATA: "true"
          GCP_PROJECT_ID: "test-project"
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─── Frontend: build + typecheck ─────────────────────────────────────────
  frontend:
    name: React build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  # ─── Docker build check ───────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t price-intelligence-api:ci .

      - name: Build sink image
        run: docker build -f docker/sink.Dockerfile -t price-intelligence-sink:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t price-intelligence-frontend:ci .
