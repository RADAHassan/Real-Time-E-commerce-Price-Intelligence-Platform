name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/price-intelligence

jobs:
  # ─── Build & push images to GitHub Container Registry ────────────────────
  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: docker/api.Dockerfile
          - name: sink
            dockerfile: docker/sink.Dockerfile
          - name: frontend
            dockerfile: docker/frontend.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-${{ matrix.name }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Cloud Run (GCP) ────────────────────────────────────────────
  deploy-gcp:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    # Requires repo secrets: GCP_SA_KEY, GCP_PROJECT_ID, GCP_REGION
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy price-intelligence-api \
            --image ${{ env.IMAGE_BASE }}-api:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},USE_MOCK_DATA=false \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy price-intelligence-frontend \
            --image ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2
